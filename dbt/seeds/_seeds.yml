version: 2

seeds:
  - name: entity_map
    description: '{{ doc("entity_map") }}'
    columns:
      - name: reported_name
        tests:
          - not_null
          - unique
      - name: canonical_company
        tests:
          - not_null
  - name: metric_dictionary
    description: '{{ doc("metric_dictionary") }}'
    columns:
      - name: canonical_metric
        tests:
          - not_null
          - unique

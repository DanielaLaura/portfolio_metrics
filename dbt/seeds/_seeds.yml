version: 2

seeds:
  - name: entity_map
    description: >
      Human-reviewed mapping from reported company names to canonical
      entities, such as the FleetLink to Apex Freight rebrand.
    columns:
      - name: reported_name
        tests:
          - not_null
          - unique
      - name: canonical_company
        tests:
          - not_null
  - name: metric_dictionary
    description: The canonical metric set, with the type and expected unit of each metric.
    columns:
      - name: canonical_metric
        tests:
          - not_null
          - unique

version: 2

models:
  - name: fct_metrics_performance_snapshot
    description: '{{ doc("fct_metrics_performance_snapshot") }}'
    columns:
      - name: metric_key
        tests:
          - not_null
          - unique
      - name: value_num
        tests:
          - not_null

  - name: dim_company
    description: '{{ doc("dim_company") }}'
    columns:
      - name: canonical_company
        tests:
          - not_null
          - unique

  - name: dim_metric
    description: '{{ doc("dim_metric") }}'
    columns:
      - name: canonical_metric
        tests:
          - not_null
          - unique

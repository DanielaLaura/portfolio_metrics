version: 2

models:
  - name: fct_metrics_performance_snapshot
    description: >
      Periodic snapshot fact with one row per (canonical_company, period,
      canonical_metric). Rows are deduped by source precedence, with the
      quarter's own report winning over a prior-quarter column and the
      snapshot last, and the losing observations survive as cross-source
      agreement checks and restatement flags.
    columns:
      - name: metric_key
        tests:
          - not_null
          - unique
      - name: value_num
        tests:
          - not_null

  - name: dim_company
    description: One row per canonical portfolio company, with the other names it has reported under.
    columns:
      - name: canonical_company
        tests:
          - not_null
          - unique

  - name: dim_metric
    description: One row per canonical metric, from the metric dictionary seed.
    columns:
      - name: canonical_metric
        tests:
          - not_null
          - unique
